{% extends 'base.html' %}
{% block title %}Login — SmartSeason{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16"
     style="background:var(--ss-card);border:1px solid var(--ss-border);
            border-radius:12px;padding:2rem;">

  <div style="text-align:center;margin-bottom:1.5rem;">
    <div style="font-size:32px;">&#127807;</div>
    <h1 style="color:var(--ss-forest);font-size:1.4rem;font-weight:600;margin-top:8px;">
      SmartSeason
    </h1>
    <p style="color:var(--ss-text-muted);font-size:13px;margin-top:4px;">
      Field Monitoring System
    </p>
  </div>

  {% if error %}
  <div style="background:var(--ss-terra-bg);border:1px solid #f0bfb5;
              color:var(--ss-terra-text);border-radius:8px;font-size:13px;"
       class="px-4 py-2 mb-4">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label style="color:var(--ss-text);font-size:13px;font-weight:500;"
             class="block mb-1">Username</label>
      <input type="text" name="username" autofocus required
        style="width:100%;border:1px solid var(--ss-border);background:var(--ss-cream);
               border-radius:8px;padding:8px 12px;font-size:14px;color:var(--ss-text);
               outline:none;box-sizing:border-box;"
        onfocus="this.style.borderColor='var(--ss-forest)'"
        onblur="this.style.borderColor='var(--ss-border)'">
    </div>
    <div>
      <label style="color:var(--ss-text);font-size:13px;font-weight:500;"
             class="block mb-1">Password</label>
      <input type="password" name="password" required
        style="width:100%;border:1px solid var(--ss-border);background:var(--ss-cream);
               border-radius:8px;padding:8px 12px;font-size:14px;color:var(--ss-text);
               outline:none;box-sizing:border-box;"
        onfocus="this.style.borderColor='var(--ss-forest)'"
        onblur="this.style.borderColor='var(--ss-border)'">
    </div>
    <button type="submit"
      style="width:100%;background:var(--ss-forest);color:var(--ss-cream);
             border:none;border-radius:8px;padding:10px;font-size:14px;
             font-weight:500;cursor:pointer;"
      onmouseover="this.style.background='var(--ss-forest-90)'"
      onmouseout="this.style.background='var(--ss-forest)'">
      Sign in
    </button>
  </form>
</div>
{% endblock %}
