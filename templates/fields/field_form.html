{% extends 'base.html' %}
{% block title %}{{ title }} — SmartSeason{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-semibold text-gray-800 mb-6">{{ title }}</h1>
  <div class="bg-white rounded-xl shadow-sm p-6">
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
          {{ field.label }}
        </label>
        {{ field }}
        {% if field.errors %}
        <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
        {% endif %}
      </div>
      {% endfor %}
      <div class="flex gap-3 pt-2">
        <button type="submit"
          class="bg-green-600 text-white text-sm px-5 py-2 rounded-lg hover:bg-green-700 transition">
          Save
        </button>
        <a href="{% url 'fields:field_list' %}"
           class="text-sm px-5 py-2 rounded-lg border border-gray-200 hover:bg-gray-50">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
